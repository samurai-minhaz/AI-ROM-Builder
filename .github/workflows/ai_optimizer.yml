name: God-Mode AI Tree Optimizer (Final Non-Dynamic)
on:
  workflow_dispatch:
    inputs:
      android_version:
        description: 'Target Android Version'
        default: '16'
      branch_name:
        description: 'Branch to Optimize'
        default: 'main'

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone samurai Trees
        run: |
          git clone https://github.com/samurai-minhaz/android_device_realme_samurai -b ${{ github.event.inputs.branch_name }} device/realme/samurai
          git clone https://github.com/samurai-minhaz/proprietary_vendor_realme_samurai -b ${{ github.event.inputs.branch_name }} vendor/realme/samurai
          git clone https://github.com/samurai-minhaz/android_kernel_realme_sm8150 -b ${{ github.event.inputs.branch_name }} kernel/realme/sm8150

      - name: AI Master Deep-Patching (Everything Included)
        run: |
          echo "Starting Ultimate AI Optimization for A${{ github.event.inputs.android_version }}..."

          # --- ১. DEVICE TREE (samurai): Display, UI & Security ---
          find device/realme/samurai -type f \( -name "*.mk" -o -name "*.bp" -o -name "*.prop" \) | while read file; do
            # 90Hz & Touch Smoothness
            echo "ro.surface_flinger.set_idle_timer_ms=4000" >> "$file"
            echo "ro.surface_flinger.set_touch_timer_ms=200" >> "$file"
            # Vulkan & Graphics
            echo "TARGET_USES_VULKAN := true" >> "$file"
            # Non-Dynamic AVB 2.0 Patch
            echo "BOARD_AVB_ENABLE := true" >> "$file"
            echo "BOARD_AVB_MAKE_VBMETA_IMAGE := true" >> "$file"
          done

          # --- ২. VENDOR TREE: GCam (LMC & BSG), EIS & Audio ---
          find vendor/realme/samurai -type f \( -name "*.xml" -o -name "*.prop" \) | while read file; do
            # GCam BSG & LMC 8.4 Support
            echo "persist.vendor.camera.HAL3.enabled=1" >> "$file"
            echo "persist.vendor.camera.privapp.list=org.codeaurora.snapcam,com.google.android.GoogleCamera,com.google.android.GoogleCamera.BSG" >> "$file"
            echo "vendor.camera.aux.packagelist=com.google.android.GoogleCamera,com.android.camera,com.google.android.GoogleCamera.BSG" >> "$file"
            # EIS & Video Stabilization
            echo "persist.vendor.camera.eis.enable=1" >> "$file"
            echo "persist.vendor.camera.video.eis=1" >> "$file"
            # Audio (ViPER বাদ দিয়ে শুধু Hi-Fi ও ক্লিয়ার কল)
            echo "persist.vendor.audio.hifi=true" >> "$file"
            echo "ro.vendor.audio.sdk.fluencetype=none" >> "$file"
          done

          # --- ৩. KERNEL TREE: Performance & Thermal ---
          find kernel/realme/sm8150/arch/arm64/configs -name "*defconfig" | while read config; do
            # RAM & Gaming Boost (LZ4 & ZRAM)
            echo "CONFIG_ZRAM=y" >> "$config"
            echo "CONFIG_LZ4_COMPRESSION=y" >> "$config"
            echo "CONFIG_CPU_FREQ_GOV_PERFORMANCE=y" >> "$config"
            # Deep Sleep & Thermal
            echo "CONFIG_THERMAL_GOVERNOR_STEP_WISE=y" >> "$config"
          done

      - name: Final Push to GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Mohammad Minhaz"
          git config --global user.email "minhaz@example.com"
          
          for dir in device/realme/samurai vendor/realme/samurai kernel/realme/sm8150; do
            cd $dir && git add . && git commit -m "AI: Full Master Patch for A${{ github.event.inputs.android_version }}" && git push || echo "Done"
            cd -
          done
