name: Evolution X A16 via Crave
on:
  workflow_dispatch:

jobs:
  crave-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Install Crave CLI
        run: |
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash
          sudo install crave /usr/local/bin

      - name: Configure Crave
        run: |
          mkdir -p ~/.crave
          # Cat method-e quote bebohar kora hoyeche jate token-er bitre '#' ba '.' thakle error na dey
          cat << 'EOF' > $HOME/crave.conf
          ${{ secrets.CRAVE_CONF }}
          EOF
          cp $HOME/crave.conf ~/.crave/crave.conf

      - name: Run Build on Crave
        run: |
          # --project flag-e amra "LOS 22.1" ba dashboard-e thaka jekono complete project-er nam use korbo
          crave run --no-patch --project "LOS 22.1" -c $HOME/crave.conf -- "
            # 1. Clean
            rm -rf .repo/local_manifests;
            
            # 2. Repo Init (Evolution X Android 16)
            repo init -u https://github.com/Evolution-X/manifest -b bq2 --depth=1 --git-lfs;
            
            # 3. Clone Trees for Samurai (Realme X2 Pro)
            git clone https://github.com/samurai-minhaz/android_device_realme_samurai -b main device/realme/samurai;
            git clone https://github.com/samurai-minhaz/proprietary_vendor_realme_samurai -b main vendor/realme/samurai;
            git clone https://github.com/samurai-minhaz/android_kernel_realme_sm8150 -b main kernel/realme/sm8150;

            # 4. Sync & Build
            repo sync -c -j\$(nproc --all) --force-sync --no-clone-bundle --no-tags;
            source build/envsetup.sh;
            lunch evolution_samurai-userdebug;
            m evolution
          "
