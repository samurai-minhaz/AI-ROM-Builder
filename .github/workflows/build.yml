name: Evolution X A16 via Crave (Full Tree Optimizer)
on:
  workflow_dispatch:

jobs:
  crave-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Install Crave CLI
        run: |
          curl -s https://raw.githubusercontent.com/accupara/crave/master/get_crave.sh | bash
          sudo install crave /usr/local/bin

      - name: Configure Crave
        run: |
          mkdir -p ~/.crave
          cat << 'EOF' > $HOME/crave.conf
          ${{ secrets.CRAVE_CONF }}
          EOF
          cp $HOME/crave.conf ~/.crave/crave.conf

      - name: Run Deep AI Optimization & Build on Crave
        run: |
          crave run --no-patch --project "LOS 22.1" -c $HOME/crave.conf -- "
            # 1. Clean & Repo Init
            rm -rf .repo/local_manifests;
            repo init -u https://github.com/Evolution-X/manifest -b bq2 --depth=1 --git-lfs;
            
            # 2. Clone Trees for Samurai (Realme X2 Pro)
            git clone https://github.com/samurai-minhaz/android_device_realme_samurai -b main device/realme/samurai;
            git clone https://github.com/samurai-minhaz/proprietary_vendor_realme_samurai -b main vendor/realme/samurai;
            git clone https://github.com/samurai-minhaz/android_kernel_realme_sm8150 -b main kernel/realme/sm8150;

            # ==========================================================
            # 3. ABSOLUTE DEEP SCAN & INJECTION (All Files)
            # ==========================================================
            echo 'Executing Deep Scan on ALL files in 3 trees...';

            # --- A. DEVICE TREE: Every single .mk, .bp, .prop file ---
            find device/realme/samurai -type f \( -name '*.mk' -o -name '*.bp' -o -name '*.prop' \) -exec sh -c '
              echo \"# AI Optimization\" >> \"{}\"
              echo \"TARGET_USES_VULKAN := true\" >> \"{}\"
              echo \"ro.surface_flinger.set_idle_timer_ms=4000\" >> \"{}\"
              echo \"ro.surface_flinger.set_touch_timer_ms=200\" >> \"{}\"
              echo \"BOARD_AVB_ENABLE := true\" >> \"{}\"
              echo \"BOARD_AVB_MAKE_VBMETA_IMAGE := true\" >> \"{}\"
            ' \;

            # --- B. VENDOR TREE: Every .xml, .prop, .txt file (GCam, EIS, Hi-Fi) ---
            find vendor/realme/samurai -type f \( -name '*.xml' -o -name '*.prop' -o -name '*.txt' \) -exec sh -c '
              echo \"# AI Multimedia Fixes\" >> \"{}\"
              echo \"persist.vendor.camera.HAL3.enabled=1\" >> \"{}\"
              echo \"persist.vendor.camera.eis.enable=1\" >> \"{}\"
              echo \"persist.vendor.camera.video.eis=1\" >> \"{}\"
              echo \"persist.vendor.camera.privapp.list=com.google.android.GoogleCamera,com.google.android.GoogleCamera.BSG\" >> \"{}\"
              echo \"vendor.camera.aux.packagelist=com.google.android.GoogleCamera,com.google.android.GoogleCamera.BSG\" >> \"{}\"
              echo \"persist.vendor.audio.hifi=true\" >> \"{}\"
              echo \"ro.vendor.audio.sdk.fluencetype=none\" >> \"{}\"
            ' \;

            # --- C. KERNEL TREE: Every single defconfig file ---
            find kernel/realme/sm8150/arch/arm64/configs -name '*defconfig' -exec sh -c '
              echo \"# AI Kernel Boost\" >> \"{}\"
              echo \"CONFIG_ZRAM=y\" >> \"{}\"
              echo \"CONFIG_LZ4_COMPRESSION=y\" >> \"{}\"
              echo \"CONFIG_CPU_FREQ_GOV_PERFORMANCE=y\" >> \"{}\"
              echo \"CONFIG_THERMAL_GOVERNOR_STEP_WISE=y\" >> \"{}\"
            ' \;

            # ==========================================================
            # 4. Sync & Build
            # ==========================================================
            repo sync -c -j\$(nproc --all) --force-sync --no-clone-bundle --no-tags;
            source build/envsetup.sh;
            lunch evolution_samurai-userdebug;
            m evolution
          "
