name: ROM Build
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Cirrus CI
        run: |
          curl -X POST "https://api.cirrus-ci.com/v1/repository/${{ secrets.CIRRUS_REPO_ID }}/build" \
          -H "Authorization: Bearer ${{ secrets.CIRRUS_TOKEN }}" \
          -d '{"branch": "main"}'
