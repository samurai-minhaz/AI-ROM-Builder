name: Evolution X A16 QPR3 Build
on:
  workflow_dispatch: # এটি থাকলে আপনি আপনার অ্যাপ থেকে বিল্ড শুরু করতে পারবেন

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # এই লাইনটি যোগ করুন
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          sudo apt update
          sudo apt install -y bc bison build-essential curl flex g++-multilib gcc-multilib git gnupg gperf libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

      - name: Sync Trees (samurai)
        run: |
          git clone https://github.com/samurai-minhaz/android_device_realme_samurai -b main device/realme/samurai
          git clone https://github.com/samurai-minhaz/proprietary_vendor_realme_samurai -b main vendor/realme/samurai
          git clone https://github.com/samurai-minhaz/android_kernel_realme_sm8150 -b main kernel/realme/sm8150

      - name: AI Auto-Patching Trees
        run: |
          echo "Starting AI-driven file edits for Evolution X A16 QPR3..."

          # 1. Device Tree Edits (BoardConfig.mk)
          # BoardConfig-এ নতুন ফ্ল্যাগ যোগ করা
          sed -i '$a TARGET_USES_VULKAN := true' device/realme/samurai/BoardConfig.mk
          sed -i '$a TARGET_USES_HWC2 := true' device/realme/samurai/BoardConfig.mk
          sed -i 's/BOARD_KERNEL_PAGESIZE := .*/BOARD_KERNEL_PAGESIZE := 4096/' device/realme/samurai/BoardConfig.mk

          # 2. HIDL to AIDL Migration (device.mk)
          # পুরনো ফিঙ্গারপ্রিন্ট সার্ভিস সরিয়ে নতুন AIDL যোগ করা
          sed -i 's/android.hardware.biometrics.fingerprint@2.1/android.hardware.biometrics.fingerprint-service.samurai/g' device/realme/samurai/device.mk

          # 3. Kernel Optimization (Memory Management)
          # কার্নেল লেভেলে Swappiness এবং VRAM টিউন করা
          echo "CONFIG_SWAP=y" >> kernel/realme/sm8150/arch/arm64/configs/samurai_defconfig
          echo "CONFIG_ZRAM=y" >> kernel/realme/sm8150/arch/arm64/configs/samurai_defconfig

          echo "All files patched successfully by AI!"
          
      - name: Run Build
        run: |
          echo "Starting stable build for Realme X2 Pro..."
          
          # ১. Repo টুল সেটআপ
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          export PATH=~/bin:$PATH

          # ২. Evolution X সোর্স ইনিশিয়ালাইজ (অ্যান্ড্রয়েড ১৬ এর জন্য ব্রাঞ্চ আপডেট হতে পারে)
          repo init -u https://github.com/Evolution-X/manifest -b udc --depth=1

          # ৩. সোর্স সিঙ্ক (এটি অনেক সময় নেবে)
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

          # ৪. বিল্ড শুরু
          source build/envsetup.sh
          lunch evolution_samurai-userdebug
          mka bacon
