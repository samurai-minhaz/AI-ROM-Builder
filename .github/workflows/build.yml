**সংক্ষেপে পরবর্তী ধাপ:**
প্রথমে [গিটহাব মার্কেটপ্লেস](https://github.com/marketplace/cirrus-ci) থেকে অ্যাপটি ইনস্টল করুন। এরপর আবার ওই লিঙ্কে গিয়ে আইডিটি চেক করুন।

